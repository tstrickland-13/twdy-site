<!DOCTYPE html>
<html>
  <head>
    <title>Netlify Forms detection</title>
  </head>
  <body>
    <!--
      Netlify scans the deployed site for static HTML forms in order to
      register them. Because this site renders forms via React/Next, we
      provide hidden static copies here so Netlify Forms keeps working.
    -->
    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="topic" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
